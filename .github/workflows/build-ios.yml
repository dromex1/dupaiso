name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Pozwala na ręczne odpalenie budowania!

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Fix Node path for Xcode
        run: sudo ln -s $(which node) /usr/local/bin/node || true

      - name: Expo Prebuild (Generate iOS project)
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Install xcpretty
        run: sudo gem install xcpretty

      - name: Build Unsigned iOS App
        run: |
          cd ios
          set -o pipefail
          xcodebuild -workspace ChatApp.xcworkspace \
            -scheme ChatApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build | tee xcodebuild.log | xcpretty

      - name: Upload Build Log (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Build-Log
          path: ios/xcodebuild.log

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          mv ios/build/Release-iphoneos/ChatApp.app Payload/
          zip -r ChatApp.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-iOS-Build
          path: ChatApp.ipa
