name: Build iOS IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      EXPO_USE_SOURCE: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild (Generate iOS project)
        run: npx expo prebuild --platform ios --clean

      - name: Fix Node path for Xcode build scripts
        run: |
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
          sudo ln -sf $(which node) /usr/local/bin/node

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned iOS App
        env:
          FORCE_BUNDLING: "1"
        run: |
          cd ios
          set -o pipefail
          xcodebuild -workspace ChatApp.xcworkspace \
            -scheme ChatApp \
            -configuration Debug \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build 2>&1 | tee xcodebuild.log | tail -100

      - name: Upload Build Log (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Xcode-Build-Log
          path: ios/xcodebuild.log

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "ChatApp.app" -type d -path "*/Debug-iphoneos/*" | head -n 1)
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r ChatApp.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatApp-iOS-Build
          path: ChatApp.ipa
